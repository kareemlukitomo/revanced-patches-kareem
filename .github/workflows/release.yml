name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    if: ${{ github.actor == 'kareemlukitomo' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    env:
      RELEASE_TIMEZONE: Asia/Jakarta
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools
        run: sdkmanager "build-tools;37.0.0"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v2

      - name: Compute CalVer tag
        id: version
        run: |
          tag="$(node ./scripts/compute-calver.mjs)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          ./gradlew :patches:build \
            --no-daemon \
            -PandroidBuildToolsDir="$ANDROID_SDK_ROOT/build-tools/37.0.0" \
            -Pversion="${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            patches/build/libs/patches-${{ steps.version.outputs.version }}-android.rvp
